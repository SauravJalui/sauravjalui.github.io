{{- /* Site override: light/dark theme pill (Hextra protocol).
       localStorage "color-theme" toggles the light/dark class on <html>,
       honoring a stored choice first, else the system preference. */ -}}
{{- $iconHeight := .iconHeight | default 14 -}}

<div class="theme-pill" role="radiogroup" aria-label="Light or dark theme">
  <button type="button" data-set-theme="light" role="radio" aria-label="Light theme" title="Light">
    {{- partial "utils/icon.html" (dict "name" "sun" "attributes" (printf "height=%v" $iconHeight)) -}}
  </button>
  <button type="button" data-set-theme="dark" role="radio" aria-label="Dark theme" title="Dark">
    {{- partial "utils/icon.html" (dict "name" "moon" "attributes" (printf "height=%v" $iconHeight)) -}}
  </button>
</div>

<script>
  (function () {
    var pill = document.currentScript.previousElementSibling;

    function applyTheme(theme, persist) {
      document.documentElement.classList.remove("light", "dark");
      document.documentElement.classList.add(theme);
      document.documentElement.style.colorScheme = theme;
      pill.querySelectorAll("button").forEach(function (b) {
        var on = b.dataset.setTheme === theme;
        b.classList.toggle("active", on);
        b.setAttribute("aria-checked", on ? "true" : "false");
      });
      if (persist) { try { localStorage.setItem("color-theme", theme); } catch (e) {} }
    }

    pill.querySelectorAll("button").forEach(function (b) {
      b.addEventListener("click", function () { applyTheme(b.dataset.setTheme, true); });
    });

    /* honor stored theme, else fall back to system preference */
    var t = null;
    try { t = localStorage.getItem("color-theme"); } catch (e) {}
    if (t !== "light" && t !== "dark") {
      t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    }
    applyTheme(t, false);
  })();
</script>
