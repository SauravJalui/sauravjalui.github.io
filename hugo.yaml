# Hugo configuration file
title: Saurav Jalui

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Blog
      pageRef: /blog
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Resume
      pageRef: /resume
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: 'https://github.com/sauravjalui'
      params:
        icon: github
    - name: Theme
      weight: 6
      params:
        type: theme-toggle

params:
  theme:
    default: light
    displayToggle: false
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/lotus-violet.svg
      dark: images/lotus-violet.svg
      width: 28
      height: 28

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: 'https://github.com/sauravjalui/sauravjalui.github.io/edit/main/content'
